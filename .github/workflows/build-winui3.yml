name: Build WinUI3 App

on:
  workflow_dispatch:
  push:
    branches:
      - winui3-app
      - main
    paths:
      - 'winui3/**'
      - 'global.json'
      - '.github/workflows/build-winui3.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # dotnet publish's CoreCLR-hosted MSBuild cannot load the WinUI3 packaging
      # tasks (XamlCompiler/PRI generation), which are legacy .NET Framework
      # (net472) assemblies — see https://github.com/microsoft/WindowsAppSDK/issues/3939.
      # Only the full-framework MSBuild.exe that ships with Visual Studio can load them.
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild winui3\MdToPdf\MdToPdf.csproj -t:Restore -p:Configuration=Release -p:RuntimeIdentifier=win-x64

      - name: Publish self-contained win-x64
        run: >
          msbuild winui3\MdToPdf\MdToPdf.csproj
          -t:Publish
          -p:Configuration=Release
          -p:RuntimeIdentifier=win-x64
          -p:SelfContained=true
          -p:WindowsAppSDKSelfContained=true
          -p:WindowsPackageType=None
          -p:PublishDir=${{ github.workspace }}\publish\win-x64\
          -m

      # msbuild -t:Publish generates the app's own resources.pri (compiled XAML/XBF for
      # MainWindow etc.) into bin\ but does not include it in the publish file list — an
      # unpackaged-WinUI3 gap. Without it, Application.LoadComponent throws XamlParseException
      # ("XAML parsing failed.") at startup because there is no compiled XAML to load.
      - name: Copy resources.pri into publish output
        shell: pwsh
        run: |
          if (Test-Path publish\win-x64\resources.pri) { Write-Host "Already in publish output."; exit 0 }
          $pri = Get-ChildItem -Recurse winui3\MdToPdf\bin, winui3\MdToPdf\obj -Include resources.pri, MdToPdf.pri -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $pri) {
            Write-Host "All .pri files under the project (for diagnosis):"
            Get-ChildItem -Recurse winui3\MdToPdf -Filter *.pri -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }
            throw "App pri file not found - the app would crash at startup with XamlParseException."
          }
          Copy-Item $pri.FullName publish\win-x64\resources.pri
          Write-Host "Copied $($pri.FullName)"

      - name: Verify publish output is runnable
        shell: pwsh
        run: |
          foreach ($required in @("MdToPdf.exe", "resources.pri", "Microsoft.ui.xaml.dll")) {
            if (-not (Test-Path "publish\win-x64\$required")) { throw "Missing required file: $required" }
          }
          Write-Host "All required files present."

      - name: Zip published output
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath MdToPdf-win-x64-selfcontained.zip

      # actions/upload-artifact@v4 already uses GitHub's newer artifact backend
      # (resumable uploads, immutable content-addressed storage) - no extra opt-in needed.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MdToPdf-win-x64-selfcontained
          path: MdToPdf-win-x64-selfcontained.zip
          retention-days: 14

      # Releases are served from GitHub's Fastly CDN rather than Actions' artifact
      # blob storage, which is far more reliable for large files over constrained
      # networks. Re-uses one floating tag/release so every push just replaces the asset.
      - name: Publish dev build to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: winui3-dev-build
          name: "WinUI3 dev build (win-x64, self-contained)"
          body: |
            Automatically rebuilt from `${{ github.sha }}` on every push to `winui3-app`/`main` that touches `winui3/`.
            Unzip and run `MdToPdf.exe` - self-contained, no .NET or Windows App SDK install required.
          prerelease: true
          make_latest: false
          files: MdToPdf-win-x64-selfcontained.zip
